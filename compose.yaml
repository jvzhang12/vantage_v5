services:
  vantage:
    build: .
    image: vantage-v5:local
    restart: unless-stopped
    env_file:
      - .env.online
    ports:
      - "${VANTAGE_V5_PUBLISH_HOST:-127.0.0.1}:${VANTAGE_V5_PORT:-8005}:8005"
    volumes:
      - vantage-v5-data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/api/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  vantage-v5-data:
